name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS deps
        run: npm install --no-audit --no-fund

      - name: Sync APP_VERSION in app.js
        run: |
          VERSION=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          sed -i "s/const APP_VERSION = '[^']*'/const APP_VERSION = '$VERSION'/" www/app.js
          echo "APP_VERSION → $VERSION"

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Restore signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::secret ANDROID_KEYSTORE_B64 absent"; exit 1
          fi
          mkdir -p android/app
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/app/signing.p12

      - name: Build release APK (signed, non-debuggable)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: reco-invest-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version détectée : $VERSION"

      - name: Rename APK with version
        run: cp android/app/build/outputs/apk/release/app-release.apk "reco-invest-${{ steps.version.outputs.version }}.apk"

      - name: Create / update GitHub Release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Reco Invest v${{ steps.version.outputs.version }}
          files: reco-invest-${{ steps.version.outputs.version }}.apk
          fail_on_unmatched_files: true
